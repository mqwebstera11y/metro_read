name: Daily News Digest

on:
  schedule:
    - cron: '0 11 * * *'    # 7:00 AM EST = 12:00 UTC (adjust for daylight saving: use '0 11 * * *' in summer)
  workflow_dispatch:         # allows manual trigger from GitHub UI (great for testing!)

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python daily_digest.py

      - name: Commit memory file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory/
          git diff --staged --quiet || git commit -m "💾 Save digest $(date +'%Y-%m-%d')"
          git push
